label: press-resources
form:
  properties:
    title:
      $type: textField
      label: Title
      i18n: true
    navigationTitle:
      $type: textField
      label: Navigation title
      i18n: true
    windowTitle:
      $type: textField
      label: Window title
      i18n: true
    hideInNav:
      $type: checkBoxField
      defaultValue: false
      label: Hide in navigation
      buttonLabel: Hide
    keywords:
      $type: textField
      label: Keywords
      i18n: true
      rows: 3
    description:
      $type: textField
      label: Description
      i18n: true
      rows: 5
    cards:
      label: Press resources
      $type: jcrMultiField
      field:
        $type: compositeField
        label: ""
        properties:
          summary:
            label: Summary
            $type: textField
            rows: 4
            i18n: true
          date:
            label: Date
            $type: dateField
          buttonLabel:
            label: Button label
            $type: textField
            i18n: true
          assetResource:
            label: Resource
            description: Link to an asset
            $type: damLinkField
            i18n: true
  layout:
    $type: tabbedLayout
    tabs:
      tabMain:
        label: Main tab
        fields:
          - name: title
          - name: navigationTitle
          - name: windowTitle
          - name: hideInNav

      tabPressResources:
        label: Press resources
        fields:
          - name: cards

      tabMeta:
        label: Metadata
        fields:
          - name: keywords
          - name: description
