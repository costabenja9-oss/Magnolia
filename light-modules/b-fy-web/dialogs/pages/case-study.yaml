label: case-study
form:
  properties:
    title:
      $type: textField
      label: Title
      i18n: true
    navigationTitle:
      $type: textField
      label: Navigation title
      i18n: true
    windowTitle:
      $type: textField
      label: Window title
      i18n: true
    hideInNav:
      $type: checkBoxField
      defaultValue: false
      label: Hide in navigation
      buttonLabel: Hide
    caseStudyLogo:
      label: Case study logo
      $type: damLinkField
    caseStudySummary:
      label: Case study summary
      $type: richTextField
      i18n: true
    keywords:
      $type: textField
      label: Keywords
      i18n: true
      rows: 3
    description:
      $type: textField
      label: Description
      i18n: true
      rows: 5
  layout:
    $type: tabbedLayout
    tabs:
      tabMain:
        label: Main tab
        fields:
          - name: title
          - name: navigationTitle
          - name: windowTitle
          - name: hideInNav
          - name: caseStudyLogo
          - name: caseStudySummary
      tabMeta:
        label: Metadata
        fields:
          - name: keywords
          - name: description
